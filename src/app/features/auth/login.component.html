<ion-content>
  <div class="login-shell min-h-screen flex items-center justify-center px-5 relative overflow-hidden">

    <!-- Decorative orbs -->
    <div class="login-orb login-orb--top"></div>
    <div class="login-orb login-orb--bottom"></div>

    <div class="w-full max-w-sm page-enter">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="login-logo inline-flex items-center justify-center w-20 h-20 rounded-3xl mb-4 pulse-glow">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <path d="M20 4L36 14V26L20 36L4 26V14L20 4Z" fill="white" opacity="0.95"/>
            <path d="M20 10L30 16V24L20 30L10 24V16L20 10Z" fill="white" opacity="0.4"/>
          </svg>
        </div>
        <h1 class="text-3xl font-black mb-1 text-navy">{{ copy.brand }}</h1>
        <p class="text-sm font-medium text-muted">{{ copy.tagline }}</p>
      </div>

      <!-- Card -->
      <div class="glass-card p-6">
        <h2 class="text-xl font-bold mb-6 text-navy">{{ copy.cardTitle }}</h2>

        <!-- Username -->
        <div class="mb-4">
          <label class="text-xs font-semibold uppercase tracking-wider mb-2 block text-muted">{{ copy.usernameLabel }}</label>
          <div class="relative">
            <ion-icon name="person-outline"
              class="absolute left-3 top-1/2 -translate-y-1/2 z-10 text-blue icon-md"></ion-icon>
            <input
              #usernameInput
              type="text"
              [value]="username()"
              (input)="username.set(usernameInput.value)"
              (change)="username.set(usernameInput.value)"
              [placeholder]="copy.usernamePlaceholder"
              autocomplete="username"
              class="w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium outline-none transition-all login-field"
              (keydown.enter)="onLogin()"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="text-xs font-semibold uppercase tracking-wider mb-2 block text-muted">{{ copy.passwordLabel }}</label>
          <div class="relative">
            <ion-icon name="lock-closed-outline"
              class="absolute left-3 top-1/2 -translate-y-1/2 z-10 text-blue icon-md"></ion-icon>
            <input
              #passwordInput
              [type]="showPassword() ? 'text' : 'password'"
              [value]="password()"
              (input)="password.set(passwordInput.value)"
              (change)="password.set(passwordInput.value)"
              [placeholder]="copy.passwordPlaceholder"
              autocomplete="current-password"
              class="w-full pl-10 pr-10 py-3 rounded-xl text-sm font-medium outline-none transition-all login-field"
              (keydown.enter)="onLogin()"
            />
            <button (click)="togglePassword()"
              class="login-eye-btn absolute right-3 top-1/2 -translate-y-1/2 text-muted">
              <ion-icon [name]="showPassword() ? 'eye-off-outline' : 'eye-outline'" class="icon-md"></ion-icon>
            </button>
          </div>
        </div>

        <!-- Error -->
        @if (error()) {
          <div class="login-error mb-4 px-4 py-3 rounded-xl text-sm font-medium">
            {{ error() }}
          </div>
        }

        <!-- Sign In button -->
        <button
          (click)="onLogin()"
          [disabled]="loading() || !canSubmit()"
          class="login-submit w-full py-3.5 rounded-xl font-bold text-white text-base transition-all duration-200"
          [class.is-pressing]="pressing()"
          (mousedown)="pressing.set(true)"
          (mouseup)="pressing.set(false)"
          (mouseleave)="pressing.set(false)">
          @if (loading()) {
            <ion-spinner name="crescent" class="login-spinner"></ion-spinner>
          } @else {
            {{ copy.submit }}
          }
        </button>

        <!-- Demo hint -->
        <p class="text-center text-xs mt-4 font-medium text-muted">
          {{ copy.demoLead }} <span class="font-mono font-bold text-blue">{{ copy.demoUsername }}</span> /
          <span class="font-mono font-bold text-blue">{{ copy.demoPassword }}</span>
        </p>
      </div>
    </div>
  </div>
</ion-content>
