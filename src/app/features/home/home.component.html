<ion-content (click)="showMenu.set(false)">
  <div class="bg-app slide-from-left">

    <!-- Header: avatar (66px, blue ring) + name + subtitle | "..." in 66px glass circle -->
    <div class="flex items-center justify-between page-header">
      <div class="flex items-center gap-3 min-w-0">
        @defer (on idle) {
          <div class="avatar-ring">
            <img [src]="user()?.image || defaultAvatar" alt="avatar" />
          </div>
        } @placeholder {
          <div class="skeleton avatar-ring"></div>
        }
        <div class="min-w-0">
          <p class="text-2xl font-bold truncate text-navy">
            {{ user()?.firstName || 'User' }} {{ user()?.lastName || '' }}
          </p>
          <p class="text-base font-medium truncate mt-1 text-muted">
            &#64;{{ user()?.username || 'user' }}
          </p>
        </div>
      </div>

      <div class="relative z-50 flex-shrink-0" (click)="$event.stopPropagation()">
        <button (click)="showMenu.set(!showMenu())"
                class="btn-circle-66"
                aria-label="Menu">
          <span class="menu-dots"><span></span><span></span><span></span></span>
        </button>
        @if (showMenu()) {
          <div class="menu-popover menu-pop top-20">
            <button (click)="resetSliders(); showMenu.set(false)"
                    [disabled]="!slidersModified()">
              <ion-icon name="refresh-outline" class="icon-sm"></ion-icon>
              Reset Sliders
            </button>
            <button (click)="signOut()" class="is-danger">
              <ion-icon name="log-out-outline" class="icon-sm"></ion-icon>
              Sign Out
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Input field (less rounded, no currency suffix, mockup placeholder) -->
    <div class="page-content-x mt-[54px] mb-[37px]">
      <div class="input-pill">
        <input
          type="number"
          min="0"
          step="1"
          inputmode="numeric"
          [value]="inputAmount() || ''"
          (input)="onInputChange($event)"
          (keydown)="blockNonPositiveKeys($event)"
          class="no-spin flex-1 text-base font-semibold outline-none bg-transparent min-w-0 text-navy"
          [placeholder]="placeholder.inputAmount"
        />
      </div>
    </div>

    <!-- Value Cards: $amount + small subtitle -->
    <div class="mb-5 page-content-x">
      <div class="grid grid-cols-2 gap-[35px]">
        @for (card of cards(); track card.id) {
          <button
            class="glass-card p-4 text-center transition-all duration-200 active:scale-95 rounded-xl"
            (click)="navigateToCurrency(card)">
            <p class="text-2xl font-black mb-1 tabular-nums text-navy">
              ${{ card.amount | number:'1.0-0' }}
            </p>
            <p class="text-[11px] font-medium truncate text-muted">{{ placeholder.cardSubtitle }}</p>
          </button>
        }
      </div>
    </div>

    <!-- Vertical sliders: tick scale (with dashes) on the right of each -->
    <div class="page-content-x">
      <div class="grid grid-cols-2 gap-[35px] h-[240px]">
        @for (card of cards(); track card.id) {
          <div class="flex items-stretch gap-3">
            <div class="flex justify-center pl-[15px]">
              <div class="slider-pill">
                <app-vertical-slider
                  [value]="card.amount"
                  [min]="SLIDER_MIN"
                  [max]="SLIDER_MAX"
                  [step]="SLIDER_STEP"
                  accent="blue"
                  [ariaLabel]="card.label + ' amount'"
                  (valueChange)="onSliderChange(card.id, $event)" />
              </div>
            </div>

            <div class="flex-1 flex flex-col justify-between py-1">
              @for (m of scaleMarks; track m) {
                <div class="tick-row">
                  <span class="tick-dash"></span>
                  <span class="text-base font-semibold tabular-nums text-navy">{{ m }}</span>
                </div>
              }
            </div>
          </div>
        }
      </div>
    </div>

    <!-- CTA: pill button sized to text + 24px horizontal padding -->
    <div class="flex justify-center mt-[48px] pb-[120px]">
      <button class="cta-pill pulse-glow active:scale-95" (click)="onTransfer()">
        {{ placeholder.ctaLabel }}
      </button>
    </div>

  </div>
</ion-content>
